name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --extra examples --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check adaswarm examples tests

      - name: Type check (mypy)
        run: uv run mypy adaswarm
        continue-on-error: true

      - name: Run tests
        run: uv run pytest --cov=adaswarm --cov-report=term-missing
